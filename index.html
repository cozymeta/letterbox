    <title>Letterbox Design Lab - Terminal Interface</title>
    <style>
        /* Terminal Theme */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #0a0a0a;
            color: #0f0;
            overflow-x: hidden;
            height: 100vh;
            position: relative;
            scroll-behavior: smooth;
            line-height: 1.6;
            transition: background-color 0.5s ease-out;
        }

        /* Scroll Highlight Colors */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0f0, #6b473d, #4b4b4b);
            opacity: 0.1;
            z-index: -1;
            transition: opacity 0.5s ease;
        }

        .terminal-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #00ff00;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #0f0;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 5px #0f0;
        }

        .terminal-nav {
            display: flex;
            gap: 20px;
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .terminal-nav a {
            color: #0f0;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            transition: all 0.3s ease;
            background-color: transparent;
            border: 1px solid #0f0;
        }

        .terminal-nav a:hover {
            background-color: #0f0;
            color: #0a0a0a;
        }

        .section {
            padding: 100px 20px;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            transform: translateY(0);
            opacity: 0;
            transition: transform 0.6s ease, opacity 0.6s ease;
            scroll-margin-top: 80px;
        }

        .section.active {
            opacity: 1;
            transform: translateY(0);
        }

        .section-title {
            font-size: 3em;
            font-weight: bold;
            text-align: center;
            margin-bottom: 50px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            display: block;
        }

        .step-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: rgba(15, 15, 15, 0.9);
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(15, 255, 15, 0.3);
            border-left: 4px solid #0f0;
        }

        .step-number {
            display: inline-block;
            background-color: #0f0;
            color: #0a0a0a;
            padding: 10px 15px;
            border-radius: 5px;
            margin-right: 20px;
            font-weight: bold;
        }

        .step-image {
            width: 100%;
            height: auto;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(15, 255, 15, 0.5);
            margin: 20px 0;
            display: block;
        }

        .step-text {
            line-height: 1.6;
            margin-bottom: 20px;
            color: #0f0;
        }
